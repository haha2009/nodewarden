name = "nodewarden"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[build]
command = "npm run build"

[assets]
binding = "ASSETS"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = false

[triggers]
crons = [ "*/5 * * * *" ]

[[d1_databases]]
binding = "DB"
database_name = "nodewarden-db"
database_id = "d8e221f1-ec7f-4327-8217-fbe58bade7a1"

[[durable_objects.bindings]]
name = "NOTIFICATIONS_HUB"
class_name = "NotificationsHub"

[[durable_objects.bindings]]
name = "BACKUP_TRANSFER_RUNNER"
class_name = "BackupTransferRunner"

[[kv_namespaces]]
binding = "ATTACHMENTS"
id = "a56ef43a50b14bff86b2c90107ca89fb"

[[kv_namespaces]]
binding = "ATTACHMENTS_KV"
id = "a56ef43a50b14bff86b2c90107ca89fb"


[[migrations]]
tag = "v1-notifications-hub"
new_sqlite_classes = [ "NotificationsHub" ]

[[migrations]]
tag = "v2-backup-transfer-runner"
new_sqlite_classes = [ "BackupTransferRunner" ]
